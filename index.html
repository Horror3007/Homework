<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT STEP TERNOPIL SHOP - Головна</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <a class="logo" href="index.html">IT STEP TERNOPIL SHOP</a>
            <nav>
                <a class="nav-btn active" href="index.html">Головна</a>
                <a class="nav-btn" href="catalog.html">Каталог</a>
                <a class="nav-btn" href="about.html">Про нас</a>
                <a class="cart-btn" href="cart.html">
                    Кошик <span class="cart-count" id="cart-count">0</span>
                </a>
            </nav>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>THY END IS NOW</h1>
            <p>MACHINE I WILL CUT YOU DOWN</p>
            <a class="btn-primary" href="catalog.html">Перейти до каталогу</a>
        </div>

        <div class="section">
            <div class="section-title">Популярні товари</div>
            <div class="products-grid" id="home-featured"></div>
        </div>
    </main>

    <footer>©IT STEP TERNOPIL SHOP - всі права захищені</footer>

    <div class="toast" id="toast"></div>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/utils.js"></script>
    <script>
        function renderFeatured() {
            var container = document.getElementById("home-featured");
            var featured = products.slice(0, 4);
            for (let i = 0; i < featured.length; i++) {
                container.appendChild(createProductCard(featured[i]));
            }
        }

        renderFeatured();
    </script>
</body>
</html>
